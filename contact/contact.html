<title>Contact — Ramos Academy</title>

</head>
<body>

<nav>
  <div class="wrap">
    <a class="logo" href="index.html"><span class="dot"></span>Ramos Academy</a>
    <ul>
      <li><a href="countries.html">Countries</a></li>
      <li><a href="about.html">About</a></li>
      <li><a href="contact.html">Contact</a></li>

    <div style="display:flex;gap:10px">
      <a class="btn-ghost" href="login.html">Log in</a>
      <a class="btn" href="login.html">Start learning</a>
    </div>
  </div>
</nav>

<div class="wrap crumb"><a href="index.html">Home</a> / Contact</div>

<section>
  <div class="wrap" style="max-width:520px">
    <div class="section-head">
      <h2>Get in touch</h2>
      <p>Questions, corrections, or ideas — we read everything.</p>
    </div>

    <form onsubmit="return false" style="display:flex;flex-direction:column;gap:16px">
      <div class="field"><label>Name</label><input type="text" placeholder="Your name"></div>
      <div class="field"><label>Email</label><input type="email" placeholder="you@example.com"></div>
      <div class="field">
        <label>Message</label>
        <textarea rows="5" placeholder="How can we help?"></textarea>
      </div>
      <button class="btn" style="align-self:flex-start">Send message</button>
    </form>
  </div>
</section>

<footer>
  <div class="wrap">
    <p>© 2026 Ramos Academy. Free education for everyone.</p>
    <ul>
      <li><a href="countries.html">Countries</a></li>
      <li><a href="about.html">About</a></li>
